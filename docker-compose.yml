services:
  mariadb:
    image: mariadb:11.8
    container_name: kaema-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_dev_kaema
      MARIADB_DATABASE: u120379226_kaema
      MARIADB_USER: kaema_dev
      MARIADB_PASSWORD: kaema_dev_pass
    ports:
      - "3307:3306"
    volumes:
      - kaema_db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  kaema_db_data: