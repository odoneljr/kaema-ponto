# spring-dotenv: localizacao do arquivo .env
dotenv.directory=../
# ===== Aplicacao =====
spring.application.name=ponto

# ===== Banco de Dados (MariaDB) =====
spring.datasource.url=jdbc:mariadb://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ===== JPA / Hibernate =====
# validate = confere se entities batem com o banco, mas NUNCA altera a estrutura
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# ===== JWT =====
# A chave vem do .env (nunca fica no codigo). Tempo de expiracao em milissegundos.
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===== Ponto / RFID =====
# Tempo minimo (em minutos) entre duas batidas da mesma tag.
# Evita registro duplicado por leitura acidental.
ponto.debounce-minutos=1